# Model Configuration
#
# Changing this file triggers the Zscaler AI Guard policy validation pipeline.
# The pipeline validates security policies with test prompts, then deploys
# the model if validation passes.
#
# The deployment section is a customer-specific example for Google Cloud
# Vertex AI. Replace with your own deployment target as needed.

model:
  huggingface_id: "google/gemma-3-1b-it"
  display_name: "gemma-3-1b-it"
  description: "Google Gemma 3 1B Instruction-Tuned model deployed via Vertex AI Model Garden"
  version: "2.1"

deployment:
  machine_type: "g2-standard-12"
  accelerator_type: "NVIDIA_L4"
  accelerator_count: 1
  region: "us-central1"

security:
  scan_enabled: true
