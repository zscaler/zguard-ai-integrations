# litellm config.yaml — Native Zscaler AI Guard guardrail (recommended)
#
# Uses the built-in zscaler_ai_guard guardrail — no custom code or Docker image needed.
# Docs: https://docs.litellm.ai/docs/proxy/guardrails/zscaler_ai_guard

model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

guardrails:
  - guardrail_name: "zscaler-ai-guard-prompt"
    litellm_params:
      guardrail: zscaler_ai_guard
      mode: "during_call"
      api_key: os.environ/ZSCALER_AI_GUARD_API_KEY
      api_base: os.environ/ZSCALER_AI_GUARD_URL         # Optional, defaults to https://api.us1.zseclipse.net/v1/detection/execute-policy
      policy_id: os.environ/ZSCALER_AI_GUARD_POLICY_ID  # Optional

  - guardrail_name: "zscaler-ai-guard-response"
    litellm_params:
      guardrail: zscaler_ai_guard
      mode: "post_call"
      api_key: os.environ/ZSCALER_AI_GUARD_API_KEY
      api_base: os.environ/ZSCALER_AI_GUARD_URL
      policy_id: os.environ/ZSCALER_AI_GUARD_POLICY_ID
